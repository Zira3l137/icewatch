name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: icewatch

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: icewatch.exe

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: icewatch

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            pkg-config

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} ${{ matrix.artifact }}

      - name: Stage artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'nightly' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Nightly (latest main)' }}
          body: ${{ startsWith(github.ref, 'refs/tags/') && format('Release {0}', github.ref_name) || format('Automated build from commit {0}', github.sha) }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: |
            icewatch
            icewatch.exe
