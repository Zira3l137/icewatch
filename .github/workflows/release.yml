name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: icewatch

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libxdo-dev \
            pkg-config

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact
        run: cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}${{ matrix.ext }} ${{ env.BINARY_NAME }}_${{ matrix.target }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}_${{ matrix.target }}${{ matrix.ext }}
          path: ${{ env.BINARY_NAME }}_${{ matrix.target }}${{ matrix.ext }}

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'nightly' }}

          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Nightly (latest main)' }}

          body: ${{ startsWith(github.ref, 'refs/tags/') && format('Release {0}', github.ref_name) || format('Automated build from commit {0}', github.sha) }}

          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}

          files: |
            icewatch_x86_64-pc-windows-msvc.exe
            icewatch_x86_64-unknown-linux-gnu
